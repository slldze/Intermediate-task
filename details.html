<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Details</title>
    <link rel="stylesheet" href="css/final.css" />
  </head>
  <body class="bg-[#f3f3f3] text-[#222222]">
    <header
      class="mx-auto flex max-w-[1440px] items-center justify-between px-[20px] pt-[30px] pb-[20px] min-[769px]:px-[40px] min-[1440px]:px-[60px]"
    >
      <a href="index.html" class="h-[48px] w-[48px] shrink-0">
        <img
          src="src/img/logo.png"
          alt="logo"
          class="h-[48px] w-[48px] object-contain"
        />
      </a>
      <nav class="flex items-center">
        <ul class="hidden items-center gap-8 min-[769px]:flex">
          <li>
            <a
              href="index.html"
              class="border-b-2 border-transparent pb-1 text-[14px] transition hover:border-green-500"
              >Home</a
            >
          </li>
          <li>
            <a
              href="index.html"
              class="border-b-2 border-transparent pb-1 text-[14px] transition hover:border-green-500"
              >Discover</a
            >
          </li>
          <li>
            <a
              href="index.html"
              class="border-b-2 border-transparent pb-1 text-[14px] transition hover:border-green-500"
              >Contact us</a
            >
          </li>
          <li>
            <a
              href="index.html"
              class="border-b-2 border-transparent pb-1 text-[14px] transition hover:border-green-500"
              >Sign in</a
            >
          </li>
          <li>
            <button
              class="rounded-[12px] bg-green-500 px-5 py-3 text-white transition hover:opacity-90"
            >
              Sell Something
            </button>
          </li>
        </ul>
        <form class="group relative min-[769px]:hidden">
          <input
            type="text"
            name="mobile-search"
            id="mobile-search"
            placeholder="Search..."
            class="absolute right-0 top-1/2 h-12 w-0 -translate-y-1/2 rounded-full border border-gray-300 bg-white pl-4 pr-12 text-sm outline-none transition-all duration-300 group-hover:w-[180px] group-focus-within:w-[180px]"
          />
          <img
            src="src/img/search.png"
            alt="Search"
            class="relative z-10 mr-[4px] h-8 w-8"
          />
        </form>
      </nav>
    </header>
  </body>
</html>
